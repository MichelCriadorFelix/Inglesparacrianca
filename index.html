<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#ffb627">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
  :root {
    --ink: #4a2b5f;        /* ameixa escura — texto principal */
    --ink-soft: #8a7a9b;   /* ameixa clara — texto de apoio */
    --coral: #ff5d73;      /* melancia */
    --coral-dk: #d63a55;
    --grape: #7c5cbf;      /* uva */
    --grape-dk: #5b3f96;
    --leaf: #22b573;       /* folha */
    --leaf-dk: #158a55;
    --sun: #ffb627;        /* sol */
    --sun-dk: #d18f0a;
    --sky: #29b6d8;        /* céu */
    --sky-dk: #1690ae;
    --card: #ffffff;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; }
  body {
    font-family: 'Fredoka', 'Comic Sans MS', 'Comic Neue', 'Chalkboard SE', 'Segoe UI', sans-serif;
    background: linear-gradient(165deg, #ffeda6 0%, #ffd3b0 55%, #ffc3cf 100%);
    background-attachment: fixed;
    min-height:100%;
    overflow-x:hidden;
    user-select:none;
    color: var(--ink);
  }
  /* enfeites flutuantes */
  .deco { position:fixed; font-size:44px; opacity:.5; z-index:0; animation: floaty 9s ease-in-out infinite; pointer-events:none; }
  @keyframes floaty { 0%,100%{transform:translateY(0) rotate(-6deg)} 50%{transform:translateY(-18px) rotate(6deg)} }

  #app { position:relative; z-index:1; max-width:560px; margin:0 auto; padding:14px 14px 44px; }

  .topbar { display:flex; align-items:center; gap:10px; margin-bottom:14px; min-height:56px; }
  .btn-home {
    background:var(--card); border:none; border-radius:20px; font-size:26px; width:56px; height:56px;
    box-shadow:0 5px 0 rgba(74,43,95,.18); cursor:pointer; flex-shrink:0;
  }
  .btn-home:active { transform:translateY(4px); box-shadow:0 1px 0 rgba(74,43,95,.18); }
  .topbar h2 { color:var(--ink); font-size:24px; flex:1; text-wrap:balance; }
  .star-count { background:var(--card); border-radius:20px; padding:8px 14px; font-size:18px; font-weight:700; color:var(--sun-dk); box-shadow:0 4px 0 rgba(74,43,95,.12); white-space:nowrap; }

  .hero { text-align:center; padding:16px 4px 8px; }
  .hero .big-emoji { font-size:66px; display:inline-block; animation: bounce 2s infinite; }
  @keyframes bounce { 0%,100%{transform:translateY(0) rotate(-4deg)} 50%{transform:translateY(-12px) rotate(4deg)} }
  .hero h1 { color:var(--ink); font-size:34px; letter-spacing:.5px; margin:6px 0 2px; }
  .hero p { color:var(--ink-soft); font-size:17px; font-weight:600; }

  .modules { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-top:18px; }
  .module-card {
    border:none; border-radius:26px; padding:18px 10px 14px; text-align:center; cursor:pointer;
    box-shadow:0 7px 0 rgba(74,43,95,.22); color:#fff; transition:transform .1s;
    font-family:inherit;
  }
  .module-card:active { transform:translateY(5px); box-shadow:0 2px 0 rgba(74,43,95,.22); }
  .module-card .m-icon { font-size:52px; display:block; }
  .module-card .m-name { font-size:21px; font-weight:700; display:block; margin-top:6px; text-shadow:0 2px 3px rgba(0,0,0,.18); }
  .module-card .m-stars { font-size:14px; display:block; margin-top:4px; opacity:.95; font-weight:600; }

  .mode-list { display:flex; flex-direction:column; gap:16px; margin-top:10px; }
  .mode-btn {
    display:flex; align-items:center; gap:16px; background:var(--card); border:none; border-radius:26px;
    padding:18px 20px; cursor:pointer; box-shadow:0 7px 0 rgba(74,43,95,.16); text-align:left; font-family:inherit;
  }
  .mode-btn:active { transform:translateY(5px); box-shadow:0 2px 0 rgba(74,43,95,.16); }
  .mode-btn .ic { font-size:44px; }
  .mode-btn .t { font-size:22px; font-weight:700; color:var(--ink); display:block; }
  .mode-btn .s { font-size:14px; color:var(--ink-soft); display:block; font-weight:600; }

  .card {
    background:var(--card); border-radius:30px; padding:24px 18px; text-align:center;
    box-shadow:0 10px 24px rgba(74,43,95,.18);
  }
  .svgpic { display:inline-block; cursor:pointer; margin:0 auto; }
  .svgpic svg { width:100%; height:100%; display:block; }
  .word-emoji { font-size:110px; line-height:1.1; display:block; cursor:pointer; transition:transform .15s; border:none; background:none; }
  .word-emoji:active { transform:scale(1.15); }
  .swatch { width:110px; height:110px; border-radius:50%; margin:0 auto; border:6px solid #fff; box-shadow:0 0 0 4px rgba(74,43,95,.1), 0 6px 14px rgba(74,43,95,.2); }
  .word-en { font-size:46px; font-weight:700; color:var(--ink); letter-spacing:3px; margin-top:8px; text-transform:uppercase; cursor:pointer; }
  .word-say {
    margin:10px auto 0; display:inline-block; background:#fff6dd; border:3px dashed var(--sun);
    color:#8a5a00; font-size:22px; font-weight:700; border-radius:18px; padding:8px 18px;
  }
  .word-say small { display:block; font-size:12px; font-weight:600; color:#b07c14; letter-spacing:.5px; }
  .syl { display:inline-block; padding:0 2px; }
  .syl:nth-child(3n+1){ color:#d63a55; } .syl:nth-child(3n+2){ color:#1690ae; } .syl:nth-child(3n){ color:#158a55; }
  .word-pt { font-size:19px; color:var(--ink-soft); margin-top:10px; font-weight:600; }
  .word-pt b { color:var(--ink); }
  .word-tip { font-size:15px; color:#0e7490; background:#e5fbff; border-radius:14px; padding:8px 12px; margin-top:10px; display:inline-block; font-weight:600; }

  .round-btns { display:flex; justify-content:center; gap:16px; margin-top:18px; flex-wrap:wrap; }
  .rbtn {
    border:none; border-radius:22px; font-size:30px; width:76px; height:76px; cursor:pointer;
    color:#fff; font-family:inherit;
  }
  .rbtn small { display:block; font-size:11px; font-weight:700; letter-spacing:1px; }
  .rbtn:active { transform:translateY(4px); }
  .rbtn.listen { background:var(--leaf); box-shadow:0 6px 0 var(--leaf-dk); }
  .rbtn.listen:active { box-shadow:0 2px 0 var(--leaf-dk); }
  .rbtn.slow { background:var(--sky); box-shadow:0 6px 0 var(--sky-dk); }
  .rbtn.slow:active { box-shadow:0 2px 0 var(--sky-dk); }
  .rbtn.mic { background:var(--coral); box-shadow:0 6px 0 var(--coral-dk); }
  .rbtn.mic:active { box-shadow:0 2px 0 var(--coral-dk); }
  .rbtn.mic.recording { animation:pulse .8s infinite; }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.12); box-shadow:0 0 0 12px rgba(255,93,115,.3);} }

  .nav-row { display:flex; justify-content:space-between; align-items:center; margin-top:18px; gap:10px; flex-wrap:wrap; }
  .nav-btn {
    border:none; border-radius:20px; background:var(--grape); color:#fff; font-size:20px; font-weight:700;
    padding:14px 22px; cursor:pointer; box-shadow:0 5px 0 var(--grape-dk); font-family:inherit;
  }
  .nav-btn:active { transform:translateY(4px); box-shadow:0 1px 0 var(--grape-dk); }
  .nav-btn:disabled { opacity:.35; }
  .nav-btn.go { background:var(--leaf); box-shadow:0 5px 0 var(--leaf-dk); }
  .nav-btn.warm { background:var(--sun); box-shadow:0 5px 0 var(--sun-dk); }
  .counter { font-size:17px; font-weight:700; color:var(--ink); }

  .feedback { min-height:86px; margin-top:14px; }
  .fb-ok { background:#e3f9ec; border:3px solid var(--leaf); color:#0f6b42; border-radius:18px; padding:12px; font-size:20px; font-weight:700; animation:pop .3s; }
  .fb-try { background:#ffe8ec; border:3px solid var(--coral); color:#a1153a; border-radius:18px; padding:12px; font-size:17px; font-weight:600; animation:pop .3s; }
  .fb-info { background:#e2f6fb; border:3px solid var(--sky); color:#0b5d73; border-radius:18px; padding:12px; font-size:17px; font-weight:600; animation:pop .3s; }
  .fb-try b, .fb-info b { font-size:20px; }
  @keyframes pop { 0%{transform:scale(.7); opacity:0} 100%{transform:scale(1); opacity:1} }

  .quiz-q { font-size:22px; font-weight:700; color:var(--ink); margin-bottom:6px; text-wrap:balance; }
  .quiz-big { font-size:90px; margin:4px 0; }
  .quiz-word-big { font-size:42px; font-weight:700; color:var(--ink); letter-spacing:3px; text-transform:uppercase; margin:12px 0 4px; }
  .quiz-opts { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:14px; }
  .qopt {
    border:4px solid #eadcf7; background:#fbf7ff; border-radius:22px; padding:14px 6px; cursor:pointer;
    font-size:44px; box-shadow:0 5px 0 rgba(74,43,95,.1); transition:transform .1s; font-family:inherit;
  }
  .qopt.word-opt { font-size:22px; font-weight:700; color:var(--ink); text-transform:uppercase; letter-spacing:1px; padding:20px 6px; }
  .qopt:active { transform:translateY(3px); }
  .qopt.right { background:#e3f9ec; border-color:var(--leaf); animation:pop .3s; }
  .qopt.wrong { background:#ffe8ec; border-color:var(--coral); animation:shake .4s; }
  .qopt:disabled { cursor:default; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
  .progressbar { height:16px; background:rgba(255,255,255,.55); border-radius:10px; overflow:hidden; margin-bottom:14px; }
  .progressbar div { height:100%; background:var(--sun); border-radius:10px; transition:width .4s; }

  .slots { display:flex; flex-wrap:wrap; justify-content:center; gap:6px; margin-top:16px; }
  .slot {
    width:42px; height:50px; border:3px dashed #c4b5fd; border-radius:12px; background:#fbf7ff;
    font-size:26px; font-weight:700; color:var(--ink); display:flex; align-items:center; justify-content:center;
  }
  .slot.small { width:32px; height:42px; font-size:20px; border-width:2px; }
  .slot.filled { border-style:solid; border-color:var(--leaf); background:#e3f9ec; animation:pop .25s; }
  .tiles { display:flex; flex-wrap:wrap; justify-content:center; gap:10px; margin-top:16px; }
  .tile {
    width:50px; height:56px; font-size:26px; font-weight:700; border:none; border-radius:14px;
    background:var(--grape); color:#fff; box-shadow:0 5px 0 var(--grape-dk); cursor:pointer; font-family:inherit;
  }
  .tile:active { transform:translateY(3px); box-shadow:0 2px 0 var(--grape-dk); }
  .tile:disabled { opacity:.2; box-shadow:none; cursor:default; }
  .tile.hint { background:var(--sun); box-shadow:0 5px 0 var(--sun-dk); animation:pulse .8s infinite; }
  .tile.wrong { background:var(--coral); box-shadow:0 5px 0 var(--coral-dk); animation:shake .4s; }

  .pair-cols { display:grid; grid-template-columns:1fr 1.35fr; gap:10px; margin-top:14px; }
  .pcol { display:flex; flex-direction:column; gap:10px; }
  .pterm, .pfn {
    border:4px solid #eadcf7; background:#fbf7ff; border-radius:16px; padding:10px 8px; cursor:pointer;
    font-size:16px; font-weight:700; color:var(--ink); font-family:inherit; min-height:58px;
  }
  .pfn { font-weight:600; font-size:14px; text-align:left; padding-left:12px; }
  .pterm.sel { border-color:var(--sun); background:#fff6dd; animation:pop .2s; }
  .pterm.done, .pfn.done { border-color:var(--leaf); background:#e3f9ec; opacity:.55; cursor:default; }
  .pfn.wrong { border-color:var(--coral); background:#ffe8ec; animation:shake .4s; }
  .buckets { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:16px; }
  .bucket {
    border:none; border-radius:20px; color:#fff; font-size:17px; font-weight:700; padding:16px 8px;
    cursor:pointer; font-family:inherit;
  }
  .bucket.a { background:var(--sky); box-shadow:0 5px 0 var(--sky-dk); }
  .bucket.b { background:var(--grape); box-shadow:0 5px 0 var(--grape-dk); }
  .bucket:active { transform:translateY(4px); box-shadow:none; }
  .sort-item { font-size:64px; }
  .sort-word { font-size:26px; font-weight:700; color:var(--ink); margin-top:4px; }

  .result-stars { font-size:56px; letter-spacing:6px; margin:10px 0; }
  .result-msg { font-size:24px; font-weight:700; color:var(--ink); text-wrap:balance; }
  .result-sub { font-size:17px; color:var(--ink-soft); margin-top:6px; font-weight:600; }

  .confetti-piece { position:fixed; top:-20px; z-index:99; font-size:22px; pointer-events:none; animation:fall linear forwards; }
  @keyframes fall { to { transform:translateY(110vh) rotate(720deg); } }

  .mic-warn { font-size:14px; color:#7c4a12; background:#fff0d9; border-radius:14px; padding:10px; margin-top:12px; font-weight:600; }
  .center { text-align:center; }
  .mt { margin-top:16px; }

  button:focus-visible { outline:4px solid var(--sky); outline-offset:2px; }
  @media (prefers-reduced-motion: reduce) {
    .deco, .hero .big-emoji, .rbtn.mic.recording { animation:none; }
    .fb-ok, .fb-try, .fb-info, .qopt.right, .qopt.wrong { animation:none; }
  }
</style>
</head>

/* ====================== PROGRESSO ====================== */
const STORE_KEY = 'ingles-divertido-v1';
function loadProgress(){ try { return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; } catch(e){ return {}; } }
function saveProgress(p){ try { localStorage.setItem(STORE_KEY, JSON.stringify(p)); } catch(e){} }
let progress = loadProgress();
function modStars(id){
  const p = progress[id] || {};
  return (p.quizStars||0) + (p.speakStars||0) + (p.spellStars||0) + (p.linkStars||0) + (p.sortStars||0);
}
function subjStars(subj){ return subj.modules.reduce((s,m)=>s+modStars(m.id),0); }
function totalStars(){ return SUBJECTS.reduce((s,x)=>s+subjStars(x),0); }
const MAX_STARS_MOD = 9; /* 3 do quiz + 3 do falar + 3 do montar */
function curLang(){ return (cur.subj && cur.subj.lang) || 'en-US'; }
function isEnglish(){ return curLang() === 'en-US'; }

/* ====================== SOM (Web Audio) ====================== */
let audioCtx = null;
function ctx(){ if(!audioCtx){ try{ audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } return audioCtx; }
function tone(freq, dur, delay, type){
  const c = ctx(); if(!c) return;
  const o = c.createOscillator(), g = c.createGain();
  o.type = type||'sine'; o.frequency.value = freq;
  const t = c.currentTime + (delay||0);
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(0.25, t+0.02);
  g.gain.exponentialRampToValueAtTime(0.0001, t+dur);
  o.connect(g); g.connect(c.destination);
  o.start(t); o.stop(t+dur+0.05);
}
function sndTap(){ tone(600,.08,0,'triangle'); }
function sndOk(){ tone(523,.12); tone(659,.12,.12); tone(784,.22,.24); }
function sndWin(){ tone(523,.12); tone(659,.12,.1); tone(784,.12,.2); tone(1047,.35,.3); }
function sndTry(){ tone(330,.18,0,'triangle'); tone(262,.28,.18,'triangle'); }

/* ====================== FALA (síntese de voz) ====================== */
let voices = [];
function refreshVoices(){ voices = window.speechSynthesis ? speechSynthesis.getVoices() : []; }
if (window.speechSynthesis){ refreshVoices(); speechSynthesis.onvoiceschanged = refreshVoices; }
function pickVoice(lang){
  const base = lang.split('-')[0].toLowerCase();
  const same = voices.filter(v => v.lang && v.lang.toLowerCase().replace('_','-').indexOf(base) === 0);
  const exact = same.filter(v => v.lang.toLowerCase().replace('_','-') === lang.toLowerCase());
  return exact.find(v=>/female|google|luciana|francisca|samantha/i.test(v.name)) || exact[0] || same[0] || null;
}
function speak(text, rate){
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const lang = curLang();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = lang; u.rate = rate || 0.8; u.pitch = 1.1;
  const v = pickVoice(lang); if (v) u.voice = v;
  speechSynthesis.speak(u);
}

const SR = window.SpeechRecognition || window.webkitSpeechRecognition || null;
let recognizing = false;
let micGranted = false;
/* Pede a autorização do microfone de forma explícita (abre o aviso do navegador). */
function ensureMic(ok, fail){
  if (micGranted) { ok(); return; }
  if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia){
    navigator.mediaDevices.getUserMedia({ audio:true }).then(stream => {
      stream.getTracks().forEach(t => t.stop());
      micGranted = true;
      ok();
    }).catch(e => {
      fail(e && (e.name === 'NotAllowedError' || e.name === 'SecurityError') ? 'not-allowed' : 'mic-error');
    });
  } else {
    ok(); /* navegador antigo: deixa o reconhecimento tentar sozinho */
  }
}
function listen(onResult, onFail){
  if (!SR) { onFail('unsupported'); return; }
  if (recognizing) return;
  const r = new SR();
  r.lang = curLang(); r.interimResults = false; r.maxAlternatives = 6; r.continuous = false;
  recognizing = true;
  let got = false, failed = false;
  const guard = setTimeout(() => { try { r.abort(); } catch(e){} }, 9000);
  r.onresult = e => {
    got = true;
    const alts = [];
    const res = e.results[0];
    for (let i=0;i<res.length;i++) alts.push(res[i].transcript);
    onResult(alts);
  };
  r.onerror = e => { failed = true; if (!got) onFail(e.error || 'error'); };
  r.onend = () => {
    recognizing = false;
    clearTimeout(guard);
    if (!got && !failed) onFail('no-speech'); /* terminou em silêncio: avisa em vez de travar */
  };
  try { r.start(); } catch(e){ recognizing=false; clearTimeout(guard); onFail('error'); }
}
/* Dentro da página de teste do Claude o microfone é bloqueado pelo site (iframe). */
function inSandbox(){ try { return window.self !== window.top; } catch(e){ return true; } }
function norm(s){
  return (s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9 ]/g,'').trim();
}
function lev(a,b){
  const m=a.length,n=b.length;
  if(!m) return n; if(!n) return m;
  const d=Array.from({length:m+1},(_,i)=>[i,...Array(n).fill(0)]);
  for(let j=0;j<=n;j++) d[0][j]=j;
  for(let i=1;i<=m;i++) for(let j=1;j<=n;j++)
    d[i][j]=Math.min(d[i-1][j]+1, d[i][j-1]+1, d[i-1][j-1]+(a[i-1]===b[j-1]?0:1));
  return d[m][n];
}
/* O Google censura palavrões com asteriscos (ex.: "peach" mal pronunciado vira "b****").
   Destapamos o palavrão só para comparar com a palavra-alvo — nunca para mostrar. */
const CENSORED = { b:'bitch', s:'shit', f:'fuck', a:'ass', d:'dick', c:'cock', p:'piss', h:'hell' };
function expandCensored(alts){
  const out = alts.slice();
  for (const a of alts){
    if (a.indexOf('*') !== -1){
      const m = a.toLowerCase().match(/([a-z])h?\*+/);
      if (m && CENSORED[m[1]]) out.push(a.toLowerCase().replace(/[a-z]h?\*+/, CENSORED[m[1]]));
    }
  }
  return out;
}
/* Sotaque brasileiro: P/B, T/D, K/G, F/V, S/Z no início da palavra se confundem. */
const VOICE_SWAP = { b:'p', p:'b', d:'t', t:'d', g:'k', k:'g', v:'f', f:'v', z:'s', s:'z' };
function closeEnough(heard, target){
  if (heard === target) return true;
  const tol = target.length <= 4 ? 1 : 2;
  if (lev(heard, target) <= tol) return true;
  const sw = VOICE_SWAP[heard[0]];
  if (sw && lev(sw + heard.slice(1), target) <= tol) return true;
  return false;
}
function matches(word, alts){
  const targets = [word.en].concat(word.aliases||[]).map(norm);
  for (const alt of expandCensored(alts)){
    const heard = norm(alt);
    if (!heard) continue;
    const heardWords = heard.split(' ');
    for (const t of targets){
      if (heardWords.includes(t)) return true;
      if (closeEnough(heard, t)) return true;
      for (const hw of heardWords) if (closeEnough(hw, t)) return true;
    }
  }
  return false;
}

/* ====================== CONFETE ====================== */
const CONF = ['🎉','⭐','🌟','💛','💜','❤️','🎈','✨'];
function confetti(n){
  for (let i=0;i<(n||30);i++){
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.textContent = CONF[Math.floor(Math.random()*CONF.length)];
    el.style.left = Math.random()*100 + 'vw';
    el.style.animationDuration = (1.6 + Math.random()*1.6) + 's';
    el.style.animationDelay = (Math.random()*0.4)+'s';
    document.body.appendChild(el);
    setTimeout(()=>el.remove(), 4000);
  }
}

function shuffle(arr){ const a=arr.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function sayHtml(say){
  return say.split('-').map(p=>'<span class="syl">'+esc(p)+'</span>').join('<span class="syl-sep">-</span>');
}
function visual(w, size){
  const s = size||110;
  if (w.svg){
    return '<span class="word-emoji svgpic" style="width:'+s+'px;height:'+s+'px;" onclick="speakCur(0.8)">'+w.svg+'</span>';

  }
  return '<span class="word-emoji" style="font-size:'+s+'px;" onclick="speakCur(0.8)">'+w.emoji+'</span>';
}
function miniIcon(w){

/* ===== Botão voltar do celular: navega DENTRO do app, como app nativo ===== */
let navLevel = 0, navigating = false;
function pushNav(level, state){
  if (navigating) return;
  try {
    if (level > navLevel) history.pushState(state, '');
    else history.replaceState(state, '');
  } catch(e){}
  navLevel = level;
}
window.addEventListener('popstate', e => {
  navigating = true;
  const s = e.state || { screen: 'home' };
  if (s.screen === 'module' || s.screen === 'activity'){
    cur.subj = SUBJECTS.find(x=>x.id===s.subj) || SUBJECTS[0];
    navLevel = s.screen === 'module' ? 2 : 3;
    openModule(s.mod);
  } else if (s.screen === 'subject'){
    navLevel = 1;
    openSubject(s.subj);
  } else {
    navLevel = 0;
    goHome();
  }
  navigating = false;
});
function goBack(){ sndTap(); try { history.back(); } catch(e){ goHome(); } }

/* ===== Botão de instalar (Android/Windows: janela nativa de instalar; iPhone: passo a passo) ===== */
let deferredPrompt = null, wantInstall = false;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  updateInstallBtn();
  if (wantInstall){
    wantInstall = false;
    const help = document.getElementById('installHelp');
    if (help) help.innerHTML = '<div class="fb-ok" style="margin-top:10px;">✅ Instalador pronto! Toca no botão de novo! 📲</div>';
    sndOk();
  }
});
window.addEventListener('appinstalled', () => {
  deferredPrompt = null;
  confetti(30);
  updateInstallBtn();
  const help = document.getElementById('installHelp');
  if (help) help.innerHTML = '<div class="fb-ok" style="margin-top:10px;">🎉 Instalado! Procura o ícone da maçã 🍎 na tela do celular!</div>';
});
function isStandalone(){
  return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
}
function isIOS(){
  return /iphone|ipad|ipod/i.test(navigator.userAgent) ||
    (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
}
function updateInstallBtn(){
  const b = document.getElementById('installBtn');
  if (!b) return;
  b.style.display = (isStandalone() || inSandbox()) ? 'none' : 'inline-block';
}
function doInstall(){
  sndTap();
  const help = document.getElementById('installHelp');
  if (deferredPrompt){
    /* janela nativa "Instalar aplicativo?" do Android / Windows / Mac */
    const p = deferredPrompt;
    deferredPrompt = null;
    if (help) help.innerHTML = '';
    p.prompt();
    p.userChoice.then(() => updateInstallBtn());
    return;
  }
  if (!help) return;
  if (isIOS()){
    /* A Apple não libera instalação com um toque — só pelo Safari, nesses 3 passos */
    help.innerHTML = '<div class="fb-info" style="margin-top:10px; text-align:left;">🍏 No iPhone/iPad é a Apple que manda, e ela só deixa instalar assim (Safari):<br>1. Toque no botão <b>Compartilhar</b> (quadrado com seta ⬆️)<br>2. Escolha <b>“Adicionar à Tela de Início”</b><br>3. Toque em <b>Adicionar</b> — vira um app de verdade! 🎉</div>';
    return;
  }
  /* Chrome ainda não liberou o instalador nesta visita: pede para aguardar e avisa quando ficar pronto */
  wantInstall = true;
  help.innerHTML = '<div class="fb-info" style="margin-top:10px; text-align:left;">⏳ Preparando o instalador... aguarde uns segundinhos que eu aviso aqui quando estiver pronto!<br><br>Se demorar: feche o navegador, abra o app de novo e toque neste botão.</div>';
}

function micBlockedMsg(){
  if (inSandbox()){
    return '<div class="fb-try">🙈 Aqui na página de teste o site bloqueia o microfone (não é culpa sua!).<br><br>' +
      'Para treinar a fala 🎤, abra o app <b>fora desta página</b>: pelo arquivo <b>index.html</b> no Chrome ou pelo endereço publicado na internet.</div>';
  }
  return '<div class="fb-try">🎙️ O microfone está bloqueado. Toque no <b>cadeado 🔒</b> (ou no ícone ⓘ) ao lado do endereço do site, escolha <b>Permissões → Microfone → Permitir</b> e tente de novo!</div>';
}
function doListen(){
  const w = cur.mod.words[cur.idx];
  const fb = document.getElementById('fb');
  const btn = document.getElementById('micBtn');
  if (window.speechSynthesis) speechSynthesis.cancel();
  fb.innerHTML = '<div class="fb-info">🎙️ Pedindo o microfone...</div>';
  ensureMic(() => reallyListen(w, fb, btn), err => {
    fb.innerHTML = err === 'not-allowed'
      ? micBlockedMsg()
      : '<div class="fb-info">😅 Não achei o microfone. Veja se ele está ligado e tenta de novo!</div>';
  });
}
function reallyListen(w, fb, btn){
  btn.classList.add('recording');
  fb.innerHTML = '<div class="fb-info">👂 Estou te ouvindo... Fala: <b>'+esc(w.say)+'</b></div>';
  listen(
    alts => {
      btn.classList.remove('recording');
      if (matches(w, alts)){
        cur.speakOk++; cur.attempts = 0;
        sndOk(); confetti(18);
        fb.innerHTML = '<div class="fb-ok">🎉 PERFEITO! Você falou <b>'+esc(w.en.toUpperCase())+'</b> certinho! ⭐</div>';
        setTimeout(speakNext, 1600);
      } else {
        cur.attempts++;
        sndTry();
        const heard = (alts[0] && alts[0].indexOf('*') === -1) ? esc(alts[0]) : '';
        let html = '<div class="fb-try">🙈 Quase!' + (heard ? ' Eu ouvi: “'+heard+'”.' : '') + '<br>Tenta falar assim: <b>'+esc(w.say)+'</b>';
        if (cur.attempts >= 2){
          html += '<br><br>Vamos ouvir bem devagarinho? 🐢';
          setTimeout(()=>speak(w.en, 0.45), 600);
        }
        html += '</div>';
        fb.innerHTML = html;
        if (cur.attempts >= 3){
          fb.innerHTML += '<div class="fb-info mt">💪 Você está treinando super bem! Pode ir para a próxima quando quiser.</div>';
        }
      }
    },
    err => {
      btn.classList.remove('recording');
      if (err === 'not-allowed' || err === 'service-not-allowed'){
        fb.innerHTML = micBlockedMsg();
      } else if (err === 'no-speech'){
        fb.innerHTML = '<div class="fb-info">🤫 Não ouvi nadinha... Aperta o 🎤 e fala bem pertinho!</div>';
      } else if (err === 'network'){
        fb.innerHTML = '<div class="fb-info">📶 O reconhecimento de voz precisa de internet. Confere a conexão e tenta de novo!</div>';
      } else {
        fb.innerHTML = '<div class="fb-info">😅 Não consegui ouvir. Tenta de novo apertando o 🎤!</div>';
      }
    }
  );
}
function speakSelfOk(){
  cur.speakOk++;
  sndOk(); confetti(14);
  setTimeout(speakNext, 500);
}
function speakNext(){
  cur.attempts = 0;
  if (cur.idx < cur.mod.words.length - 1){
    cur.idx++;
    renderSpeak();
  } else {
    speakDone();
  }
}
function speakDone(){
  const n = cur.mod.words.length;
  const ratio = cur.speakOk / n;
  const stars = ratio >= 0.9 ? 3 : ratio >= 0.6 ? 2 : ratio > 0 ? 1 : 0;
  progress[cur.mod.id] = progress[cur.mod.id] || {};
  if ((progress[cur.mod.id].speakStars||0) < stars){ progress[cur.mod.id].speakStars = stars; }
  saveProgress(progress);
  if (stars >= 2){ sndWin(); confetti(50); } else { sndOk(); }
  app.innerHTML =
    topbar('🎤 Falar', 'openModule(\''+cur.mod.id+'\')') +
    '<div class="card center">' +
      '<div style="font-size:74px;">'+(stars>=3?'🏆':stars===2?'🥳':'💪')+'</div>' +
      '<div class="result-stars">'+'⭐'.repeat(stars)+'☆'.repeat(3-stars)+'</div>' +
      '<div class="result-msg">Você acertou '+cur.speakOk+' de '+n+' palavras!</div>' +
      '<div class="result-sub">'+(stars>=3?'UAU! Pronúncia de campeã! 🌟':stars===2?'Muito bom! Quase perfeito!':'Continue treinando, você consegue!')+'</div>' +
      '<div class="round-btns">' +
        '<button class="nav-btn" onclick="startSpeak()">Treinar de novo 🔁</button>' +
        '<button class="nav-btn go" onclick="startQuiz()">Jogar 🎮</button>' +
      '</div>' +
    '</div>';
}

/* ---------- MODO MONTAR (escrever letra por letra, como na prova) ---------- */
function startSpell(){
  sndTap();
  pushNav(3, { screen:'activity', subj:cur.subj.id, mod:cur.mod.id });
  cur.idx = 0; cur.spellGood = 0;
  spellSetup();
  renderSpell();
  setTimeout(()=>speak(cur.mod.words[cur.idx].en, 0.8), 350);
}
function spellSetup(){
  cur.spellWord = cur.mod.words[cur.idx].en.toLocaleUpperCase('pt-BR');
  cur.spellPos = 0; cur.spellErr = 0;
  cur.spellTiles = shuffle(cur.spellWord.split('')).map(ch => ({ ch: ch, used: false }));
}
function renderSpell(wrongIdx){
  const w = cur.mod.words[cur.idx];
  const n = cur.mod.words.length;
  const small = cur.spellWord.length > 7;
  const slots = cur.spellWord.split('').map((ch,i) =>
    '<span class="slot'+(i<cur.spellPos?' filled':'')+(small?' small':'')+'">'+(i<cur.spellPos?ch:'')+'</span>').join('');
  const showHint = cur.spellErr >= 2 && cur.spellPos < cur.spellWord.length;
  let hintGiven = false;
  const tiles = cur.spellTiles.map((t,i) => {
    let cls = 'tile';
    if (!t.used && showHint && !hintGiven && t.ch === cur.spellWord[cur.spellPos]){ cls += ' hint'; hintGiven = true; }
    if (i === wrongIdx) cls += ' wrong';
    return '<button class="'+cls+'" '+(t.used?'disabled':'')+' onclick="spellTap('+i+')">'+t.ch+'</button>';
  }).join('');
  app.innerHTML =
    topbar('✍️ Montar', 'openModule(\''+cur.mod.id+'\')') +
    '<div class="progressbar"><div style="width:'+(cur.idx/n*100)+'%"></div></div>' +
    '<div class="card">' +
      visual(w, 80) +
      '<div class="word-pt" style="margin-top:6px;">'+(isEnglish()?'Monte <b>'+esc(w.pt)+'</b> em inglês:':'Monte: <b>'+esc(w.pt)+'</b>')+'</div>' +
      '<div class="slots">'+slots+'</div>' +
      '<div class="tiles">'+tiles+'</div>' +
      '<div class="round-btns">' +
        '<button class="rbtn listen" onclick="speakCur(0.8)">🔊<small>OUVIR</small></button>' +
        '<button class="rbtn slow" onclick="speakCur(0.45)">🐢<small>DEVAGAR</small></button>' +
      '</div>' +
      '<div class="feedback" id="fb" style="min-height:50px;">' +
        (showHint ? '<div class="fb-info">💡 Toca na letra amarela que está piscando!</div>' : '') +
      '</div>' +
    '</div>' +
    '<div class="nav-row">' +
      '<span class="counter">Palavra '+(cur.idx+1)+' de '+n+'</span>' +
      '<button class="nav-btn" onclick="spellNext()">Pular ➡</button>' +
    '</div>';
  window.scrollTo(0,0);
}
function spellTap(i){
  const t = cur.spellTiles[i];
  if (!t || t.used || cur.spellPos >= cur.spellWord.length) return;
  if (t.ch === cur.spellWord[cur.spellPos]){
    t.used = true; cur.spellPos++;
    tone(500 + cur.spellPos*60, .09);
    renderSpell();
    if (cur.spellPos >= cur.spellWord.length){
      if (cur.spellErr <= 2) cur.spellGood++;
      sndOk(); confetti(16);
      speak(cur.mod.words[cur.idx].en, 0.85);
      document.getElementById('fb').innerHTML =
        '<div class="fb-ok">🎉 '+esc(cur.spellWord)+'! Você escreveu certinho!</div>';
      setTimeout(spellNext, 1800);
    }
  } else {
    cur.spellErr++;
    sndTry();
    renderSpell(i);
  }
}
function spellNext(){
  if (cur.idx < cur.mod.words.length - 1){
    cur.idx++;
    spellSetup();
    renderSpell();
    setTimeout(()=>speak(cur.mod.words[cur.idx].en, 0.8), 350);
  } else {
    spellDone();
  }
}
function spellDone(){
  const n = cur.mod.words.length;
  const ratio = cur.spellGood / n;
  const stars = ratio >= 0.9 ? 3 : ratio >= 0.6 ? 2 : ratio > 0 ? 1 : 0;
  progress[cur.mod.id] = progress[cur.mod.id] || {};
  if ((progress[cur.mod.id].spellStars||0) < stars){ progress[cur.mod.id].spellStars = stars; }
  saveProgress(progress);
  if (stars >= 2){ sndWin(); confetti(50); } else { sndOk(); }
  app.innerHTML =
    topbar('✍️ Montar', 'openModule(\''+cur.mod.id+'\')') +
    '<div class="card center">' +
      '<div style="font-size:74px;">'+(stars>=3?'🏆':stars===2?'🥳':'💪')+'</div>' +
      '<div class="result-stars">'+'⭐'.repeat(stars)+'☆'.repeat(3-stars)+'</div>' +
      '<div class="result-msg">Você montou '+cur.spellGood+' de '+n+' palavras quase sem errar!</div>' +
      '<div class="result-sub">'+(stars>=3?'UAU! Escrevendo igual gente grande! 🌟':stars===2?'Muito bom! Falta pouquinho!':'Continue treinando, cada letra conta!')+'</div>' +
      '<div class="round-btns">' +
        '<button class="nav-btn" onclick="startSpell()">Montar de novo 🔁</button>' +
        '<button class="nav-btn go" onclick="startQuiz()">Jogar 🎮</button>' +
      '</div>' +
    '</div>';
}

/* ---------- MODO LIGAR (ligue à função, como no dever) ---------- */
function startLink(){
  sndTap();
  pushNav(3, { screen:'activity', subj:cur.subj.id, mod:cur.mod.id });
  const pool = shuffle(cur.mod.words.filter(w=>w.fn)).slice(0, 5);
  cur.link = { pairs: pool, right: shuffle(pool.slice()), sel: -1, done: {}, err: 0, hits: 0 };
  renderLink();
}
function renderLink(wrongIdx){
  const L = cur.link;
  const left = L.pairs.map((w,i) =>
    '<button class="pterm'+(L.done[w.en]?' done':'')+(L.sel===i?' sel':'')+'" onclick="linkPick('+i+')">'+miniIcon(w)+' '+esc(w.en)+'</button>').join('');
  const right = L.right.map((w,i) =>
    '<button class="pfn'+(L.done[w.en]?' done':'')+(i===wrongIdx?' wrong':'')+'" onclick="linkTry('+i+')">'+esc(w.fn)+'</button>').join('');
  app.innerHTML =
    topbar('🔗 Ligar') +
    '<div class="card">' +
      '<div class="quiz-q">Toque na palavra e depois na função dela!</div>' +
      '<div class="pair-cols"><div class="pcol">'+left+'</div><div class="pcol">'+right+'</div></div>' +
      '<div class="feedback" id="fb" style="min-height:50px;"></div>' +
    '</div>' +
    '<div class="nav-row"><span class="counter">Ligadas: '+L.hits+' de '+L.pairs.length+'</span></div>';
  window.scrollTo(0,0);
}
function linkPick(i){
  const L = cur.link;
  if (L.done[L.pairs[i].en]) return;
  L.sel = i;
  sndTap();
  speak(L.pairs[i].en, 0.9);
  renderLink();
}
function linkTry(i){
  const L = cur.link;
  const fnW = L.right[i];
  if (L.done[fnW.en]) return;
  const fb = () => document.getElementById('fb');
  if (L.sel < 0){
    renderLink();
    fb().innerHTML = '<div class="fb-info">👈 Primeiro toca numa palavra do lado esquerdo!</div>';
    return;
  }
  const term = L.pairs[L.sel];
  if (term.en === fnW.en){
    L.done[term.en] = true; L.hits++; L.sel = -1;
    sndOk();
    if (L.hits >= L.pairs.length){
      const stars = L.err <= 1 ? 3 : L.err <= 3 ? 2 : 1;
      progress[cur.mod.id] = progress[cur.mod.id] || {};
      if ((progress[cur.mod.id].linkStars||0) < stars) progress[cur.mod.id].linkStars = stars;
      saveProgress(progress);
      sndWin(); confetti(40);
      app.innerHTML =
        topbar('🔗 Ligar') +
        '<div class="card center">' +
          '<div style="font-size:74px;">'+(stars>=3?'🏆':stars===2?'🥳':'💪')+'</div>' +
          '<div class="result-stars">'+'⭐'.repeat(stars)+'☆'.repeat(3-stars)+'</div>' +
          '<div class="result-msg">Você ligou tudo certinho!</div>' +
          '<div class="round-btns">' +
            '<button class="nav-btn" onclick="startLink()">Ligar de novo 🔁</button>' +
            (cur.mod.questions ? '<button class="nav-btn go" onclick="startProva()">Prova 🧠</button>' : '') +
          '</div>' +
        '</div>';
    } else {
      renderLink();
      document.getElementById('fb').innerHTML = '<div class="fb-ok">✅ Isso! '+miniIcon(term)+' '+esc(term.en)+' → '+esc(term.fn)+'</div>';
    }
  } else {
    L.err++;
    sndTry();
    renderLink(i);
    document.getElementById('fb').innerHTML = '<div class="fb-try">🙈 Quase! Essa função é de outra palavra. Tenta de novo!</div>';
  }
}

/* ---------- MODO SEPARAR (classificar nas caixinhas, como no dever) ---------- */
function startSort(){
  sndTap();
  pushNav(3, { screen:'activity', subj:cur.subj.id, mod:cur.mod.id });
  const cfg = cur.mod.sort;
  const items = cfg.fromWords
    ? cur.mod.words.filter(w=>w.cat!==undefined).map(w=>({ t:w.en, e:w.emoji, c:w.cat, why:w.pt }))
    : cfg.items;
  cur.sortGame = { cats: cfg.cats, items: shuffle(items), i: 0, err: 0 };
  renderSort();
  setTimeout(()=>speak(cur.sortGame.items[0].t, 0.9), 350);
}
function renderSort(){
  const G = cur.sortGame;
  const it = G.items[G.i];
  app.innerHTML =
    topbar('🧺 Separar') +
    '<div class="progressbar"><div style="width:'+(G.i/G.items.length*100)+'%"></div></div>' +
    '<div class="card">' +
      '<div class="quiz-q">Em qual caixinha isso entra?</div>' +

      '<div class="buckets">' +
        '<button class="bucket a" onclick="sortPick(0)">'+esc(G.cats[0])+'</button>' +

}
function sortPick(c){

    if (G.i < G.items.length - 1){
      G.i++;
      renderSort();
      document.getElementById('fb').innerHTML = '<div class="fb-ok">✅ Isso mesmo!</div>';
      setTimeout(()=>speak(G.items[G.i].t, 0.9), 300);
    } else {
      const stars = G.err <= 1 ? 3 : G.err <= 3 ? 2 : 1;
      progress[cur.mod.id] = progress[cur.mod.id] || {};
      if ((progress[cur.mod.id].sortStars||0) < stars) progress[cur.mod.id].sortStars = stars;
      saveProgress(progress);
      sndWin(); confetti(40);
      app.innerHTML =
        topbar('🧺 Separar') +
        '<div class="card center">' +
          '<div style="font-size:74px;">'+(stars>=3?'🏆':stars===2?'🥳':'💪')+'</div>' +
          '<div class="result-stars">'+'⭐'.repeat(stars)+'☆'.repeat(3-stars)+'</div>' +
          '<div class="result-msg">Você separou tudo nas caixinhas certas!</div>' +
          '<div class="round-btns">' +
            '<button class="nav-btn" onclick="startSort()">Separar de novo 🔁</button>' +
            (cur.mod.questions ? '<button class="nav-btn go" onclick="startProva()">Prova 🧠</button>' : '') +
          '</div>' +
        '</div>';

    G.err++;
    sndTry();
    document.getElementById('fb').innerHTML =
      '<div class="fb-try">🙈 Hmm, olha de novo! '+(it.why ? 'Lembra: '+esc(it.why) : 'Pensa com calma e tenta a outra caixinha!')+'</div>';
  }
}

/* ---------- MODO PROVA (marque a alternativa correta) ---------- */
function startProva(){
  sndTap();
  pushNav(3, { screen:'activity', subj:cur.subj.id, mod:cur.mod.id });
  cur.prova = { qs: shuffle(cur.mod.questions.slice()), i: 0, score: 0 };
  renderProva();
}
function renderProva(){
  const P = cur.prova;
  const q = P.qs[P.i];
  const correct = q.opts[q.a];
  const opts = shuffle(q.opts.slice());
  const optHtml = opts.map(o =>
    '<button class="qopt word-opt" style="font-size:16px; text-transform:none; letter-spacing:0; padding:14px 10px;" onclick="provaAnswer(this,'+(o===correct)+')">'+esc(o)+'</button>').join('');
  app.innerHTML =
    topbar('🧠 Prova') +
    '<div class="progressbar"><div style="width:'+(P.i/P.qs.length*100)+'%"></div></div>' +
    '<div class="card">' +
      '<div class="quiz-q" style="cursor:pointer;" onclick="speak(cur.prova.qs[cur.prova.i].q, 0.95)">🧠 '+esc(q.q)+' <small style="font-weight:600; color:var(--ink-soft);">(toque para ouvir)</small></div>' +
      '<div class="quiz-opts" style="grid-template-columns:1fr;">'+optHtml+'</div>' +
      '<div class="feedback" id="fb" style="min-height:60px;"></div>' +
    '</div>' +
    '<div class="nav-row"><span class="counter">Pergunta '+(P.i+1)+' de '+P.qs.length+'</span><span class="counter">Pontos: '+P.score+' 🌟</span></div>';
  window.scrollTo(0,0);
  setTimeout(()=>speak(q.q, 0.95), 350);
}
function provaAnswer(btn, right){
  const P = cur.prova;
  const q = P.qs[P.i];
  document.querySelectorAll('.qopt').forEach(b=>b.disabled = true);
  const fb = document.getElementById('fb');
  if (right){
    btn.classList.add('right');
    P.score++;
    sndOk();
    fb.innerHTML = '<div class="fb-ok">✅ Certinho! '+esc(q.why||'')+'</div>';
    setTimeout(provaNext, 1900);
  } else {
    btn.classList.add('wrong');
    sndTry();
    document.querySelectorAll('.qopt').forEach(b=>{
      if (b.textContent === q.opts[q.a]) b.classList.add('right');
    });
    fb.innerHTML = '<div class="fb-try">🙈 A certa é: <b>'+esc(q.opts[q.a])+'</b><br>'+esc(q.why||'')+'</div>';
    setTimeout(provaNext, 2800);
  }
}
function provaNext(){
  cur.prova.i++;
  if (cur.prova.i < cur.prova.qs.length) renderProva();
  else {
    const P = cur.prova;
    const ratio = P.score / P.qs.length;
    const stars = ratio >= 0.85 ? 3 : ratio >= 0.6 ? 2 : ratio >= 0.35 ? 1 : 0;
    progress[cur.mod.id] = progress[cur.mod.id] || {};
    if ((progress[cur.mod.id].quizStars||0) < stars) progress[cur.mod.id].quizStars = stars;
    saveProgress(progress);
    if (stars >= 2){ sndWin(); confetti(60); } else { sndOk(); }
    app.innerHTML =
      topbar('🧠 Prova') +
      '<div class="card center">' +
        '<div style="font-size:80px;">'+(stars>=3?'🏆':stars===2?'🥳':stars===1?'😊':'💪')+'</div>' +
        '<div class="result-stars">'+'⭐'.repeat(stars)+'☆'.repeat(3-stars)+'</div>' +
        '<div class="result-msg">Você acertou '+P.score+' de '+P.qs.length+' perguntas!</div>' +
        '<div class="result-sub">'+(stars>=3?'NOTA 10! Pronta para a prova de verdade! 🌟':stars===2?'Muito bom! Revisa mais uma vez e refaz!':'Vamos revisar no modo 📖 e tentar de novo?')+'</div>' +
        '<div class="round-btns">' +
          '<button class="nav-btn" onclick="startProva()">Refazer a prova 🔁</button>' +
          '<button class="nav-btn warm" onclick="startLearn()">Revisar 📖</button>' +
        '</div>' +
      '</div>';
  }
}

/* ---------- MODO JOGAR (QUIZ) ---------- */
const QUIZ_LEN = 8;
function startQuiz(){
  sndTap();
  pushNav(3, { screen:'activity', subj:cur.subj.id, mod:cur.mod.id });
  const words = shuffle(cur.mod.words).slice(0, QUIZ_LEN);
  cur.quiz = { qs: words.map(w => ({ w, type: pickType() })), i: 0, score: 0, len: words.length };
  renderQuiz();
}
function pickType(){
  const types = ['audio2pic','pic2word','word2pic'];
  return types[Math.floor(Math.random()*types.length)];
}
function optVisual(o){
  if (o.svg) return '<span class="svgpic" style="width:64px;height:64px;">'+o.svg+'</span>';
  if (o.color) return '<div class="swatch" style="width:64px;height:64px;border-width:4px;background:'+o.color+'; margin:0 auto;"></div>';
  return o.emoji;
}
function renderQuiz(){
  const q = cur.quiz.qs[cur.quiz.i];
  const w = q.w;
  const others = shuffle(cur.mod.words.filter(x=>x.en!==w.en)).slice(0,3);
  const opts = shuffle([w].concat(others));
  let head = '', optHtml = '';
  if (q.type === 'audio2pic'){
    head = '<div class="quiz-q">👂 Ouça e escolha o certo!</div>' +
           '<button class="rbtn listen" style="margin:6px auto; display:block;" onclick="speakQuizWord()">🔊<small>OUVIR</small></button>';
    optHtml = opts.map(o=>'<button class="qopt" onclick="answer(this,'+(o.en===w.en)+')">'+optVisual(o)+'</button>').join('');
  } else if (q.type === 'pic2word'){
    head = '<div class="quiz-q">👀 Que palavra é essa? (toque na figura para ouvir!)</div>' +
           '<div class="quiz-big" style="cursor:pointer;" onclick="speakQuizWord()">'+optVisual(w)+'</div>';
    optHtml = opts.map(o=>'<button class="qopt word-opt" onclick="answer(this,'+(o.en===w.en)+')">'+esc(o.en)+'</button>').join('');
  } else {
    head = '<div class="quiz-q">📖 Leia a palavra e escolha!</div>' +
           '<div class="quiz-word-big" style="cursor:pointer;" onclick="speakQuizWord()">'+esc(w.en)+'</div>' +
           '<div class="word-say" style="font-size:16px;">🗣️ “'+sayHtml(w.say)+'”</div>';
    optHtml = opts.map(o=>'<button class="qopt" onclick="answer(this,'+(o.en===w.en)+')">'+optVisual(o)+'</button>').join('');
  }
  app.innerHTML =
    topbar('🎮 Jogar', 'openModule(\''+cur.mod.id+'\')') +
    '<div class="progressbar"><div style="width:'+(cur.quiz.i/cur.quiz.len*100)+'%"></div></div>' +
    '<div class="card">' + head + '<div class="quiz-opts">'+optHtml+'</div><div class="feedback" id="fb" style="min-height:60px;"></div></div>' +
    '<div class="nav-row"><span class="counter">Pergunta '+(cur.quiz.i+1)+' de '+cur.quiz.len+'</span><span class="counter">Pontos: '+cur.quiz.score+' 🌟</span></div>';
  window.scrollTo(0,0);
  if (q.type === 'audio2pic') setTimeout(speakQuizWord, 400);
}
function speakQuizWord(){ speak(cur.quiz.qs[cur.quiz.i].w.en, 0.8); }
function answer(btn, right){
  const w = cur.quiz.qs[cur.quiz.i].w;
  document.querySelectorAll('.qopt').forEach(b=>b.disabled = true);
  const fb = document.getElementById('fb');
  if (right){
    btn.classList.add('right');
    cur.quiz.score++;
    sndOk();
    fb.innerHTML = '<div class="fb-ok">✅ Isso! <b>'+esc(w.en.toUpperCase())+'</b> = '+esc(w.pt)+' 🎉</div>';
    speak(w.en, 0.85);
    setTimeout(nextQuiz, 1400);
  } else {
    btn.classList.add('wrong');
    sndTry();
    fb.innerHTML = '<div class="fb-try">🙈 Ops! O certo é <b>'+esc(w.en.toUpperCase())+'</b> (“'+esc(w.say)+'”) = '+esc(w.pt)+'</div>';
    document.querySelectorAll('.qopt').forEach(b=>{
      if (b.getAttribute('onclick').indexOf('true') !== -1) b.classList.add('right');
    });
    speak(w.en, 0.7);
    setTimeout(nextQuiz, 2300);
  }
}
function nextQuiz(){
  cur.quiz.i++;
  if (cur.quiz.i < cur.quiz.len) renderQuiz(); else quizDone();
}
function quizDone(){
  const score = cur.quiz.score;
  const ratio = score / cur.quiz.len;
  const stars = ratio >= 0.85 ? 3 : ratio >= 0.6 ? 2 : ratio >= 0.35 ? 1 : 0;
  progress[cur.mod.id] = progress[cur.mod.id] || {};
  if ((progress[cur.mod.id].quizStars||0) < stars){ progress[cur.mod.id].quizStars = stars; }
  saveProgress(progress);
  if (stars >= 2){ sndWin(); confetti(60); } else if (stars === 1){ sndOk(); confetti(20); } else { sndTry(); }
  app.innerHTML =
    topbar('🎮 Jogar', 'openModule(\''+cur.mod.id+'\')') +
    '<div class="card center">' +
      '<div style="font-size:80px;">'+(stars>=3?'🏆':stars===2?'🥳':stars===1?'😊':'💪')+'</div>' +
      '<div class="result-stars">'+'⭐'.repeat(stars)+'☆'.repeat(3-stars)+'</div>' +
      '<div class="result-msg">Você fez '+score+' de '+cur.quiz.len+' pontos!</div>' +
      '<div class="result-sub">'+(
        stars>=3 ? 'INCRÍVEL! Você é uma campeã de inglês! 🌟' :
        stars===2 ? 'Muito bom! Falta pouquinho para 3 estrelas!' :
        stars===1 ? 'Legal! Treina mais um pouco no modo Aprender!' :
        'Vamos treinar no modo 📖 Aprender primeiro? Você vai arrasar!') +'</div>' +
      '<div class="round-btns">' +
        '<button class="nav-btn" onclick="startQuiz()">Jogar de novo 🔁</button>' +
        '<button class="nav-btn warm" onclick="startLearn()">Aprender 📖</button>' +
      '</div>' +
    '</div>';
}
